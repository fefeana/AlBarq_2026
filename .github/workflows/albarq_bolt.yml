`yaml
name: Build AlBarq APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: default

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Detekt (Kotlin Static Analysis)
        run: ./gradlew detekt

      - name: Upload Detekt Report
        uses: actions/upload-artifact@v4
        with:
          name: Detekt-Report
          path: build/reports/detekt/*.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 coverage pylint bandit checkov

      - name: Run Flake8 (Python Lint)
        run: flake8 .

      - name: Run Pylint (Python Static Analysis)
        run: pylint /*.py || true

      - name: Upload Pylint Report
        uses: actions/upload-artifact@v4
        with:
          name: Pylint-Report
          path: pylint.log

      - name: Run Bandit (Python Security Scan)
        run: bandit -r . -f xml -o bandit-report.xml

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: Bandit-Security
          path: bandit-report.xml

      - name: Run Python Tests with Coverage
        run: |
          coverage run -m unittest discover
          coverage report -m
          coverage xml -o coverage.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: Python-Coverage
          path: coverage.xml

      - name: Run Android Unit Tests
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AlBarq-Debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        if: success()
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ${{ secrets.ALBARQ_KEYSTORE }} \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.ALBARQKEYALIAS }}

      - name: Align & Verify APK
        run: |
          zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-signed.apk
          apksigner verify app-release-signed.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AlBarq-Release
          path: app-release-signed.apk

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=fefeanaAlBarq2026
            -Dsonar.organization=fefeana
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Security Scan with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: 'table'
          output: 'trivy-report.txt'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-Security
          path: trivy-report.txt

      - name: Gradle Dependency Audit (OWASP)
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload Dependency Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-Dependency-Audit
          path: build/reports/dependency-check-report.html

      - name: Docker Security Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_IMAGE }}
          format: 'table'
          output: 'docker-security-report.txt'

      - name: Upload Docker Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Docker-Security
          path: docker-security-report.txt

      - name: Secret Scan with Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --report-format json --report-path gitleaks-report.json

      - name: Upload Secret Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: Secret-Scan
          path: gitleaks-report.json

      - name: Infrastructure as Code Scan (Checkov)
        run: checkov -d . --output-file-path checkov-report.json --output json

      - name: Upload IaC Security Report
        uses: actions/upload-artifact@v4
        with:
          name: IaC-Security
          path: checkov-report.json

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ فشل في Workflow AlBarq_2026 ⚡ بقيادة مسيو بوزيه مانيتيك 🎼. راجع التقارير فورًا!"
            }
        env:
          SLACKWEBHOOKURL: ${{ secrets.SLACKWEBHOOKURL }}

      - name: Notify Teams on Failure
        if: failure()
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          webhook-uri: ${{ secrets.TEAMSWEBHOOKURL }}
          message: "❌ فشل في Workflow AlBarq_2026 ⚡ بقيادة مسيو بوزيه مانيتيك 🎼. راجع التقارير فورًا!"
          title: "CI/CD Alert"
          color: "FF0000"

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "✅ نجاح Workflow AlBarq_2026 ⚡ كل التقارير جاهزة، الأوركسترا تعزف بتناغم!"
            }
        env:
          SLACKWEBHOOKURL: ${{ secrets.SLACKWEBHOOKURL }}

      - name: Notify Teams on Success
        if: success()
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          webhook-uri: ${{ secrets.TEAMSWEBHOOKURL }}
          message: "✅ نجاح Workflow AlBarq_2026 ⚡ كل التقارير جاهزة، الأوركسترا تعزف بتناغم!"
          title: "CI/CD Alert"
          color: "00FF00"

      - name: Auto-Create GitHub Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "❌ CI/CD Failure in AlBarq_2026 ⚡",
              body: "المطور شِغي ⚡\n\nحدث فشل في Workflow بقيادة مسيو بوزيه مانيتيك 🎼.\n\nراجع التقارير فورًا.",
              labels: ["ci", "failure"]
            })

      - name: Auto-Create GitHub Issue on Security Findings
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
