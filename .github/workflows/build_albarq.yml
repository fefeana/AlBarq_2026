name: ⚡ مسيو بوزيه مانيتيك 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - run: npm ci

      # 4️⃣ Lint & Unit Tests + Coverage ≥ 80%
      - run: npm run lint
      - run: npm run test -- --coverage
      - run: |
          COVERAGE=$(npx coverage-percentage ./coverage/lcov.info)
          echo "Coverage: $COVERAGE%"
          [ "$COVERAGE" -lt 80 ] && exit 1

      # 5️⃣ Build project
      - run: npm run build

      # 6️⃣ Integration Tests
      - run: npm run test:integration

      # 7️⃣ Deploy API
      - run: |
          gcloud functions deploy albarq2026-api \
            --runtime nodejs20 --trigger-http --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      # 8️⃣ Deploy frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: your-firebase-project-id

      # 9️⃣ Direct MCP API Trigger
      - run: |
          curl -X POST https://mcp-server.example.com/api/deploy \
            -H "Authorization: Bearer ${{ secrets.MCP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "AlBarq-2026",
              "branch": "'"$GITHUB_REF_NAME"'",
              "status": "deployed",
              "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
            }'

      # 🔟 Backup
      - uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: build/
          destination: gs://your-bucket-name/builds/
          credentials: ${{ secrets.GCP_CREDENTIALS }}
