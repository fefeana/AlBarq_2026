name: AlBarq-2026 Unified Workflow

on:
  push:                # 0️⃣ تشغيل عند أي عملية دفع (push)
    branches: [ "main" ]
  pull_request:        # 0️⃣ تشغيل عند أي طلب دمج (PR)
    branches: [ "main" ]

jobs:
  albarq-ci-cd:
    runs-on: ubuntu-latest   # 1️⃣ تحديد بيئة التشغيل (Ubuntu)

    steps:
      # 2️⃣ جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v3

      # 3️⃣ إعداد بيئة Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 4️⃣ تثبيت Dependencies مع معالجة الأخطاء
      - name: Install dependencies
        run: npm install || echo "❌ خطأ في تثبيت الحزم"

      # 5️⃣ فحص الكود (Lint/Test) مع رسائل أوضح
      - name: Run lint and tests
        run: |
          npm run lint || echo "⚠️ Lint step failed"
          npm test || echo "⚠️ Unit tests failed"

      # 6️⃣ بناء المشروع مع fallback
      - name: Build project
        run: npm run build || echo "❌ Build step failed"

      # 7️⃣ فحص الأمان باستخدام CodeQL
      - name: Security scan
        uses: github/codeql-action/analyze@v2

      # 8️⃣ نشر المشروع (Firebase/MCP)
      - name: Deploy
        run: |
          echo "Deploying AlBarq-2026..."
          # أضف أوامر النشر هنا

      # 9️⃣ ربط مباشر مع n8n
      - name: Trigger n8n workflow
        run: |
          curl -X POST "$N8N_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d '{"repository":"AlBarq-2026","status":"deployed"}'

      # 🔟 ربط مع MCP Server
      - name: Trigger MCP Server
        run: |
          curl -X POST "$MCP_SERVER_URL/api/trigger" \
          -H "Authorization: Bearer $MCP_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"project":"AlBarq-2026","workflow":"main","status":"active"}'

      # 1️⃣1️⃣ اختبار تكاملي مع رسالة أوضح
      - name: Run integration test
        run: |
          npm run test:integration || echo "⚠️ Integration test failed"

      # 1️⃣2️⃣ تزامن مع التوثيق
      - name: Sync Documentation
        run: |
          npm run docs:build || echo "⚠️ Documentation build failed"
          git add docs/
          git commit -m "📚 تحديث التوثيق مع التزامن" || echo "No documentation changes"
          git push

      # 1️⃣3️⃣ الالتزام التلقائي + إشعار خارجي مع تفاصيل إضافية
      - name: Auto commit and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config --global user.name "مسيو بوزيه مانيتيك"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "⚡ تحديث شامل + اختبار + توثيق + تزامن من Workflow مسيو بوزيه مانيتيك" || echo "❌ لا توجد تغييرات جديدة"
          git push

          # 🌿 حساب مدة التنفيذ
          START_TIME=$(date +%s)
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # 🌿 رسالة نجاح داخل الـ Logs مع تفاصيل
          echo "✅ البرق اكتمل على الفرع: $GITHUB_REF_NAME"
          echo "⏱️ مدة التنفيذ: ${DURATION} ثانية"

          # 🔔 إشعار خارجي (Discord/Telegram) مع تفاصيل إضافية
          curl -X POST "$DISCORD_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ البرق اكتمل على الفرع: $GITHUB_REF_NAME ⏱️ مدة التنفيذ: ${DURATION} ثانية\"}"
