name: ⚡ مسيو بوزيه مانيتيك 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Lint & Unit Tests
      - name: Run lint
        run: npm run lint
      - name: Run unit tests
        run: npm run test -- --coverage

      # ✅ شرط التغطية ≥ 80%
      - name: Check coverage threshold
        run: |
          COVERAGE=$(npx coverage-percentage ./coverage/lcov.info)
          echo "Coverage: $COVERAGE%"
          [ "$COVERAGE" -lt 80 ] && exit 1

      # 5️⃣ Build project
      - name: Build project
        run: npm run build

      # 6️⃣ Integration Tests (صارمة)
      - name: Run integration tests
        run: npm run test:integration

      # 7️⃣ Save Artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: build/

      # 8️⃣ Deploy API to Google Cloud Functions
      - name: Deploy API
        if: success()
        run: |
          gcloud functions deploy albarq2026-api \
            --runtime nodejs20 --trigger-http --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      # 9️⃣ Deploy frontend to Firebase Hosting
      - name: Deploy to Firebase Hosting
        if: success()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: your-firebase-project-id

      # 🔟 Direct API Call to MCP Servers
      - name: Direct MCP API Trigger
        if: success()
        run: |
          echo "🚀 Triggering MCP servers directly..."
          curl -X POST https://mcp-server.example.com/api/deploy \
            -H "Authorization: Bearer ${{ secrets.MCP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "AlBarq-2026",
              "branch": "'"$GITHUB_REF_NAME"'",
              "status": "deployed",
              "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
            }'

      # 1️⃣1️⃣ Backup to Google Cloud Storage
      - name: Upload to Google Cloud Storage
        if: success()
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: build/
          destination: gs://your-bucket-name/builds/
          credentials: ${{ secrets.GCP_CREDENTIALS }}
