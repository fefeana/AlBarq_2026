- name: Install dependencies
        run: npm install || echo "❌ Dependencies installation failed"

      - name: Build project
        run: npm run build || echo "❌ Build step failed"

      - name: Sync Documentation
        run: |
          npm run docs:build || echo "⚠️ Documentation build failed"
          git add docs/
          git commit -m "📚 Documentation synced" || echo "❌ No new documentation changes"
          git push

      - name: Auto commit and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config --global user.name "مسيو بوزيه مانيتيك"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "⚡ Unified update from Workflow مسيو بوزيه مانيتيك" || echo "❌ No new changes"
          git push

          START_TIME=$(date +%s)
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "✅ Workflow completed on branch: $GITHUB_REF_NAME"
          echo "⏱️ Duration: ${DURATION} seconds"

          curl -X POST "$DISCORD_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ Workflow completed on branch: $GITHUB_REF_NAME ⏱️ Duration: ${DURATION} seconds\"}"
